<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İslam.App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#0f6b4f;
    --green-deep:#0a4d39;
    --green-soft:#1a8c66;
    --mint:#e7f4ee;
    --gold:#c9a253;
    --gold-soft:#e3c987;
    --paper:#f6faf7;
    --ink:#0c2a20;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    background:radial-gradient(125% 85% at 50% -8%, #ffffff 0%, var(--mint) 45%, #d3e9df 100%);
    color:var(--ink);
    min-height:100vh;
    display:flex;justify-content:center;
    padding:0 20px 56px;
    overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;
    background-image:radial-gradient(circle at 50% 50%, transparent 6px, rgba(15,107,79,.05) 7px, transparent 8px);
    background-size:46px 46px;pointer-events:none;z-index:0;
  }
  .wrap{
    width:100%;max-width:430px;position:relative;z-index:1;
    padding-top:52px;animation:rise .8s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  /* header — shahada flag */
  .crest{width:96px;height:auto;margin:0 auto 18px;display:grid;place-items:center;animation:sway 6s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .crest svg{width:100%;height:auto;filter:drop-shadow(0 14px 26px rgba(10,77,57,.3))}

  h1{text-align:center;font-size:1.95rem;font-weight:700;letter-spacing:-.01em;color:var(--green-deep)}
  .arabic{font-family:'Amiri',serif;text-align:center;color:var(--gold);font-size:1.3rem;margin-top:8px;line-height:1.6;direction:rtl}
  .tag{text-align:center;color:rgba(12,42,32,.6);font-size:.92rem;margin-top:10px;line-height:1.5;max-width:300px;margin-inline:auto}

  /* app cards */
  .apps{margin-top:32px;display:flex;flex-direction:column;gap:14px}
  .app{
    padding:18px;border-radius:20px;background:#ffffff;
    border:1px solid rgba(15,107,79,.14);
    box-shadow:0 8px 24px -16px rgba(10,77,57,.4);
    transition:.22s ease;
  }
  .app:hover{border-color:rgba(15,107,79,.3);box-shadow:0 12px 30px -16px rgba(10,77,57,.5)}
  .app-head{display:flex;align-items:center;gap:14px}
  .app-ic{
    width:52px;height:52px;flex-shrink:0;border-radius:15px;display:grid;place-items:center;
    background:linear-gradient(150deg,var(--green-soft),var(--green-deep));
  }
  .app-ic svg{width:26px;height:26px}
  .app-ic.img{background:#fff;border:1px solid rgba(15,107,79,.14);overflow:hidden}
  .app-ic.img img{width:100%;height:100%;object-fit:contain;padding:7px}
  .app-info{flex:1;min-width:0}
  .app-info b{font-size:1.08rem;font-weight:600;display:block;color:var(--green-deep)}
  .app-info span{font-size:.8rem;color:rgba(12,42,32,.5)}
  .soon{font-size:.68rem;color:var(--green);border:1px solid rgba(15,107,79,.35);padding:2px 8px;border-radius:999px;white-space:nowrap;background:var(--mint)}

  /* store buttons — real logos, same colour */
  .stores{display:flex;gap:9px;margin-top:14px}
  .store{
    flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:11px;border-radius:12px;text-decoration:none;
    font-size:.82rem;font-weight:600;color:#fff;
    background:var(--green);transition:.2s ease;
  }
  .store svg{width:18px;height:18px}
  .store:hover{background:var(--green-deep);transform:translateY(-2px);box-shadow:0 10px 22px -10px rgba(15,107,79,.6)}
  .store:focus-visible{outline:2px solid var(--gold);outline-offset:3px}

  /* socials — original transparent logos */
  .soc-invite{text-align:center;margin-top:14px;font-size:.92rem;font-weight:600;color:var(--green-deep)}
  .socials{display:flex;justify-content:center;gap:22px;margin-top:14px;margin-bottom:6px}
  .soc{display:grid;place-items:center;transition:transform .25s ease}
  .soc svg{width:38px;height:38px;display:block}
  .soc.tiktok{animation:bob 3.2s ease-in-out infinite}
  .soc.insta{animation:bob 3.2s ease-in-out infinite .8s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .soc:hover{transform:scale(1.12)}
  .soc:focus-visible{outline:2px solid var(--gold);outline-offset:4px;border-radius:8px}

  footer{text-align:center;margin-top:38px;color:rgba(12,42,32,.4);font-size:.8rem;line-height:1.7}
  footer .dot{color:var(--gold)}
  @media (prefers-reduced-motion:reduce){.crest,.soc{animation:none}.wrap{animation:none}}
</style>
</head>
